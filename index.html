<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS Certification - Analyse Technique</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        #game-container { background: var(--card); width: 100%; max-width: 800px; border-radius: 1.5rem; padding: 2rem; border: 1px solid #334155; align-self: center; }

        .progress-bar { height: 6px; background: #334155; border-radius: 10px; margin: 1rem 0 2rem; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }

        .question-box h2 { font-size: 1.3rem; line-height: 1.5; margin-bottom: 1.5rem; }
        .options-grid { display: grid; gap: 0.75rem; }

        .option {
            background: #334155; padding: 1rem; border-radius: 0.75rem; cursor: pointer;
            border: 2px solid transparent; transition: 0.2s; font-size: 1rem;
        }
        .option.selected { border-color: var(--primary); }
        .option.correct { background: var(--success) !important; color: white; border-color: #16a34a; }
        .option.wrong { background: var(--danger) !important; color: white; border-color: #dc2626; }

        /* ZONE EXPLICATION */
        #analysis-box {
            display: none; background: #0f172a; border-radius: 1rem; padding: 1.5rem;
            margin-top: 1.5rem; border: 1px solid var(--primary); animation: fadeIn 0.4s;
        }
        .analysis-title { font-weight: 800; color: var(--primary); text-transform: uppercase; font-size: 0.8rem; margin-bottom: 0.5rem; display: block; }
        .analysis-text { font-size: 0.95rem; line-height: 1.6; color: #cbd5e1; }

        .btn {
            width: 100%; padding: 1rem; border-radius: 0.75rem; border: none;
            font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 1.5rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-next { background: #334155; color: white; display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #recap, #quiz-ui { display: none; }
        .active { display: block !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="lobby" class="active">
        <h1 style="color: var(--primary); text-align: center;">SNS Training Center</h1>
        <p style="text-align: center; color: var(--text-dim);">Mode Analyse : Explications détaillées après chaque question.</p>
        <button class="btn btn-primary" onclick="startGame()">COMMENCER L'ANALYSE</button>
    </div>

    <div id="quiz-ui">
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold;">
            <span id="cat-label">LOGS & DÉBOGAGE</span>
            <span id="counter-label">1 / 65</span>
        </div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="question-box">
            <h2 id="q-text">Chargement...</h2>
            <div id="options-grid" class="options-grid"></div>
        </div>

        <div id="analysis-box">
            <span class="analysis-title">Analyse du pare-feu</span>
            <div id="analysis-content" class="analysis-text"></div>
        </div>

        <button id="validate-btn" class="btn btn-primary" onclick="validateAnswer()" disabled>VALIDER LA RÉPONSE</button>
        <button id="next-btn" class="btn btn-next" onclick="nextQuestion()">CONTINUER &raquo;</button>
    </div>

    <div id="recap">
        <h1 style="text-align:center">Rapport d'Examen</h1>
        <div id="final-score" style="font-size: 3rem; text-align:center; color: var(--primary); font-weight: 900;">0/65</div>
        <button class="btn btn-primary" onclick="location.reload()">RETOURNER AU LOBBY</button>
    </div>
</div>

<script>
    const questions = [
        {
            cat: "VPN",
            q: "Quel protocole de la suite IPsec est responsable du chiffrement des données (confidentialité) ?",
            options: ["AH (Authentication Header)", "IKE (Internet Key Exchange)", "ESP (Encapsulating Security Payload)", "TLS (Transport Layer Security)"],
            correct: 2,
            explain: "<b>Pourquoi c'est ESP ?</b> C'est le seul protocole IPsec qui encapsule les données pour les chiffrer.<br><br><b>Pourquoi les autres sont fausses ?</b><br>• <i>AH</i> n'offre que l'intégrité (pas de chiffrement).<br>• <i>IKE</i> ne transporte pas de données, il négocie juste les clés.<br>• <i>TLS</i> est utilisé pour le VPN SSL, pas IPsec."
        },
        {
            cat: "USINE",
            q: "Combien de politiques de filtrage (slots) peuvent être actives à la fois sur un SNS ?",
            options: ["Une seule politique locale", "Jusqu'à 10 slots simultanés", "Une politique par interface physique", "5 locales et 5 globales via SMC"],
            correct: 0,
            explain: "<b>Pourquoi une seule ?</b> Le moteur Stormshield compile et applique une seule base de règles (slot) à la fois pour garantir la performance.<br><br><b>Pourquoi les autres sont fausses ?</b><br>• On peut <i>préparer</i> plusieurs slots, mais un seul est 'actif'.<br>• On ne peut pas diviser la politique par interface, elle est globale au boîtier."
        },
        {
          cat: "ROUTAGE",
          q: "Dans l'ordre de priorité Stormshield, lequel passe avant le routage statique ?",
          options: ["Le routage dynamique (OSPF/BGP)", "Le routage par défaut (Gateway)", "Le routage par politique (PBR)", "Le routage RIP"],
          correct: 2,
          explain: "<b>Pourquoi PBR ?</b> Le Policy-Based Routing est défini dans les règles de filtrage, qui sont examinées AVANT la table de routage standard.<br><br><b>Pourquoi les autres sont fausses ?</b><br>• Le dynamique et le défaut sont toujours après les routes statiques dans l'ordre de priorité SNS."
        }
        // Ajoute ici tes autres questions avec le champ 'explain'
    ];

    let currentQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let selectedIdx = null;

    function startGame() {
        document.getElementById('lobby').classList.remove('active');
        document.getElementById('quiz-ui').classList.add('active');
        currentQuestions = [...questions].sort(() => Math.random() - 0.5);
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentIdx];
        selectedIdx = null;
        document.getElementById('analysis-box').style.display = 'none';
        document.getElementById('cat-label').innerText = q.cat;
        document.getElementById('counter-label').innerText = `${currentIdx + 1} / ${currentQuestions.length}`;
        document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / currentQuestions.length) * 100}%`;
        document.getElementById('q-text').innerText = q.q;
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => {
                if(document.getElementById('next-btn').style.display === 'block') return;
                selectedIdx = i;
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                div.classList.add('selected');
                document.getElementById('validate-btn').disabled = false;
            };
            grid.appendChild(div);
        });
        document.getElementById('validate-btn').style.display = 'block';
        document.getElementById('validate-btn').disabled = true;
        document.getElementById('next-btn').style.display = 'none';
    }

    function validateAnswer() {
        const q = currentQuestions[currentIdx];
        const isCorrect = selectedIdx === q.correct;
        if(isCorrect) score++;
        
        const options = document.querySelectorAll('.option');
        options[q.correct].classList.add('correct');
        if(!isCorrect) options[selectedIdx].classList.add('wrong');
        
        document.getElementById('analysis-content').innerHTML = q.explain;
        document.getElementById('analysis-box').style.display = 'block';
        
        document.getElementById('validate-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < currentQuestions.length) showQuestion();
        else finishGame();
    }

    function finishGame() {
        document.getElementById('quiz-ui').classList.remove('active');
        document.getElementById('recap').classList.add('active');
        document.getElementById('final-score').innerText = `${score}/${currentQuestions.length}`;
    }
</script>
</body>
</html>
