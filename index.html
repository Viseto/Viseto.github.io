<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS Certification Training</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            background: var(--card);
            width: 95%;
            max-width: 800px;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            padding: 2rem;
        }

        /* Lobby Style */
        .hero { text-align: center; padding: 2rem 0; }
        .hero h1 { font-size: 2.5rem; margin: 0; color: var(--primary); letter-spacing: -1px; }
        .hero p { color: var(--text-dim); margin-top: 0.5rem; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 2rem 0;
        }

        .stat-card {
            background: #0f172a;
            padding: 1.5rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid #334155;
        }

        .stat-card span { display: block; font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-card b { font-size: 1.5rem; color: var(--primary); }

        /* Quiz UI */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #334155;
        }

        .progress-bar {
            height: 6px;
            background: #334155;
            width: 100%;
            border-radius: 10px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-box h2 { font-size: 1.4rem; line-height: 1.5; margin-bottom: 2rem; }

        .options-grid { display: grid; gap: 0.75rem; }

        .option {
            background: #334155;
            padding: 1.25rem;
            border-radius: 0.75rem;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            font-size: 1.05rem;
        }

        .option:hover { background: #475569; }
        .option.selected { border-color: var(--primary); background: #1e293b; }
        .option.correct { background: var(--success) !important; border-color: var(--success); }
        .option.wrong { background: var(--danger) !important; border-color: var(--danger); }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 1.25rem;
            border-radius: 0.75rem;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1.5rem;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-next { background: var(--success); color: white; display: none; }

        /* Recap */
        .recap-item {
            background: #0f172a;
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--danger);
        }
        .recap-item.is-correct { border-left-color: var(--success); }

        #lobby, #quiz-ui, #recap { display: none; }
        #lobby.active, #quiz-ui.active, #recap.active { display: block; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="lobby" class="active">
        <div class="hero">
            <h1>SNS Certification</h1>
            <p>Préparation intensive Stormshield (65 questions)</p>
        </div>
        <div class="stats-grid">
            <div class="stat-card">
                <span>Meilleur Score</span>
                <b id="best-score-display">0/65</b>
            </div>
            <div class="stat-card">
                <span>Dernière Tentative</span>
                <b id="last-score-display">--</b>
            </div>
        </div>
        <button class="btn btn-primary" onclick="startGame()">DÉMARRER LE TEST</button>
    </div>

    <div id="quiz-ui">
        <div class="quiz-header">
            <span id="cat-label" style="color: var(--primary); font-weight: 800; font-size: 0.9rem;">CATÉGORIE</span>
            <span id="counter-label" style="font-weight: bold;">1 / 65</span>
        </div>
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div class="question-box">
            <h2 id="q-text">Chargement de la question...</h2>
            <div id="options-grid" class="options-grid"></div>
        </div>
        <button id="validate-btn" class="btn btn-primary" onclick="validateAnswer()" disabled>VALIDER LA RÉPONSE</button>
        <button id="next-btn" class="btn btn-next" onclick="nextQuestion()">QUESTION SUIVANTE &raquo;</button>
    </div>

    <div id="recap">
        <div class="hero">
            <h1 id="final-result-title">Test terminé</h1>
            <div id="final-score" style="font-size: 4rem; font-weight: 900; margin: 1rem 0;">0/65</div>
        </div>
        <div id="recap-list" style="max-height: 300px; overflow-y: auto; padding-right: 10px;"></div>
        <button class="btn btn-primary" onclick="location.reload()">RETOUR AU MENU</button>
    </div>
</div>

<script>
    const allQuestions = [
        { cat: "Usine", q: "Combien de politiques de filtrage NAT locales peuvent être actives à la fois ?", options: ["1", "5", "10"], correct: 0 },
        { cat: "Usine", q: "Par défaut, la durée de vie d’un tunnel VPN SSL est de :", options: ["3 600s", "14 400s", "36 000s"], correct: 1 },
        { cat: "Usine", q: "LDAP interne : l’authentification s’effectue obligatoirement par mot de passe ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Usine", q: "Firewall en configuration usine :", options: ["Bloque tout", "Bloque tout sauf pings et ports admin", "Laisse tout passer"], correct: 1 },
        { cat: "Usine", q: "Si le mot de passe 'admin' est inchangé, l'interface affiche une erreur critique ?", options: ["Oui", "Non"], correct: 0 },
        { cat: "Technique", q: "Deux VLAN peuvent-ils être rattachés à la même interface physique ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Technique", q: "Plusieurs adresses IP sur une seule interface du firewall ?", options: ["Non", "Oui, dans tous les cas", "Seulement modèle SN510+"], correct: 1 },
        { cat: "Technique", q: "Le nombre maximum d’interfaces peut-il être modifié ?", options: ["Oui", "Non, dépend du modèle", "Seulement via CLI"], correct: 1 },
        { cat: "Technique", q: "Limiter la taille des paquets ICMP (ping) entrants ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Admin", q: "Sur appliances physiques, copier la partition active vers la passive ?", options: ["Oui", "Non"], correct: 0 },
        { cat: "Admin", q: "Basculer de partition principale à secours sans redémarrage ?", options: ["Oui", "Non"], correct: 1 },
        { cat: "Admin", q: "Service NTP : a besoin du fuseau horaire pour l’heure locale ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Admin", q: "Fréquence Active Update paramétrable depuis l’interface ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Admin", q: "Le firewall peut être serveur DHCP ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Admin", q: "Navigateurs supportés :", options: ["Firefox, Edge, Chrome", "Opera, Safari", "Uniquement Firefox"], correct: 0 },
        { cat: "Logs", q: "Modifier le % d'espace disque par famille de traces ?", options: ["Oui", "Non"], correct: 0 },
        { cat: "Logs", q: "Logs pleins : que se passe-t-il ?", options: ["Arrêt firewall", "Rotation automatique", "Envoi d'un ping"], correct: 1 },
        { cat: "Logs", q: "Visualiser les journaux via Wireshark ?", options: ["Oui", "Non (Interface Admin)"], correct: 1 },
        { cat: "Logs", q: "Le RGPD a-t-il un impact sur la gestion des logs ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Logs", q: "Arrêter l’écriture des événements pour une catégorie ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Objets", q: "Plusieurs objets FQDN en destination d'une règle ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Objets", q: "Réseau machine : résolution ARP périodique ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Objets", q: "Serveur DNS : sert à quoi ?", options: ["Associer nom et IP", "Envoyer des mails", "Faire du NAT"], correct: 0 },
        { cat: "Objets", q: "Équivalent objet 'Internet' :", options: ["Any", "Network_in", "Firewall_internals"], correct: 0 },
        { cat: "Objets", q: "Norme des VLAN sur Stormshield :", options: ["802.1Q", "RFC 894", "Hyperlan"], correct: 0 },
        { cat: "Objets", q: "Plus de deux interfaces dans un bridge ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Routage", q: "Répartition de charge possible pour :", options: ["Défaut", "Politique", "Dynamique", "Tous les types précités"], correct: 3 },
        { cat: "Routage", q: "Route statique : interface de sortie obligatoire ?", options: ["Vrai", "Faux"], correct: 1 },
        { cat: "Routage", q: "Priorité par défaut (1 = prioritaire) :", options: ["PBR > Statique > Dynamique", "Statique > PBR > Dynamique", "Défaut > Statique"], correct: 0 },
        { cat: "Routage", q: "NAT : modifier IP Source ET IP Destination simultanément ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Routage", q: "Poids 50% GW1, 25% GW2, 25% GW3 :", options: ["2/1/1", "4/2/2", "Les deux"], correct: 2 },
        { cat: "Filtrage", q: "Règle pour serveur Web DMZ accessible d'Internet :", options: ["Internet vers IP Publique", "Internet vers IP Privée", "DMZ vers Internet"], correct: 0 },
        { cat: "Filtrage", q: "IPS Stormshield est-il propriétaire ?", options: ["Oui", "Non (Open Source)"], correct: 0 },
        { cat: "Filtrage", q: "Ordre de traitement des règles :", options: ["Par ordre d'apparition", "Plus restrictive en premier", "Bloquer en premier"], correct: 0 },
        { cat: "Filtrage", q: "L'action 'Bloquer' déclenche une alarme ?", options: ["Vrai", "Faux"], correct: 1 },
        { cat: "Filtrage", q: "Filtrage par SNI (certificat) utilisable sur :", options: ["HTTP", "HTTPS", "Les deux"], correct: 1 },
        { cat: "VPN", q: "Standard IPsec défini par :", options: ["IETF (Internet)", "Stormshield", "Cisco"], correct: 0 },
        { cat: "VPN", q: "Protocole de négociation IPsec :", options: ["IKE", "ESP", "AH"], correct: 0 },
        { cat: "VPN", q: "Phases pour établir un tunnel IPsec ?", options: ["1", "2", "3"], correct: 1 },
        { cat: "VPN", q: "VPN SSL : droit d'accès global à tous ?", options: ["Vrai", "Faux"], correct: 1 },
        { cat: "VPN", q: "Keepalive IPsec se configure en :", options: ["Secondes", "Minutes", "Heures"], correct: 0 },
        { cat: "VPN", q: "Chiffrement IPsec assuré par :", options: ["ESP", "AH", "L2TP"], correct: 0 },
        { cat: "Avancé", q: "Analyse antivirale sur flux HTTPS :", options: ["Oui, si déchiffrement", "Oui, toujours", "Non jamais"], correct: 0 },
        { cat: "Avancé", q: "Breach Fighter nécessite 'Antivirus avancé' ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Avancé", q: "Extended Web Control évite le stockage local URL ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Avancé", q: "HTTPS non déchiffré : certificat affiché est celui du proxy ?", options: ["Vrai", "Faux"], correct: 1 },
        { cat: "Avancé", q: "Proxy SSL activé via règle de filtrage ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Admin", q: "Sauvegarde partition active possible ?", options: ["Oui, tous modèles", "Physique seulement", "Virtuel seulement"], correct: 0 },
        { cat: "Technique", q: "Mode 'Transparent' :", options: ["Bridge (Interfaces pontées)", "Adressage par interface", "Aucune IP"], correct: 0 },
        { cat: "Routage", q: "Routage sans NAT : champs modifiés ?", options: ["MAC Source/Destination", "IP Source/Destination", "Ports"], correct: 0 },
        { cat: "Logs", q: "Accès complet aux logs via code temporaire ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Auth", q: "Auth LDAP interne : mot de passe obligatoire ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Filtrage", q: "Connexions externes analysées ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Technique", q: "135.1.1.0/23 est une adresse :", options: ["Réseau", "Hôte", "Broadcast"], correct: 0 },
        { cat: "VPN", q: "VPN entre 2 SNS :", options: ["IPsec", "SSL", "OpenVPN", "Tous"], correct: 3 },
        { cat: "Admin", q: "Administration via :", options: ["Navigateur, CLI, SSH", "Telnet uniquement", "Console uniquement"], correct: 0 },
        { cat: "Filtrage", q: "Modifier l'action de plusieurs règles à la fois ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Technique", q: "Interfaces VLAN toujours internes ?", options: ["Vrai", "Faux"], correct: 1 },
        { cat: "Routage", q: "Translation statique :", options: ["1 IP Privée vers 1 IP Publique", "N vers 1", "1 vers N"], correct: 0 },
        { cat: "Avancé", q: "Redirection port ICMP possible ?", options: ["Vrai", "Faux"], correct: 1 },
        { cat: "Logs", q: "Tracer une règle NAT ?", options: ["Oui", "Non"], correct: 0 },
        { cat: "VPN", q: "IKEv1 : extrémités de trafic identiques ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Routage", q: "Algorithme répartition : quadruplet IP/Port ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Auth", q: "Politique d'auth basée sur machine source ?", options: ["Vrai", "Faux"], correct: 0 },
        { cat: "Objets", q: "Objet FQDN : adresse via DNS ?", options: ["Vrai", "Faux"], correct: 0 }
    ];

    let currentQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let selectedIdx = null;
    let history = [];

    // --- LOGIQUE CORE ---

    function initStats() {
        const best = localStorage.getItem('sns_best') || 0;
        const last = localStorage.getItem('sns_last') || '--';
        document.getElementById('best-score-display').innerText = `${best}/65`;
        document.getElementById('last-score-display').innerText = last === '--' ? '--' : `${last}/65`;
    }

    function startGame() {
        switchScreen('quiz-ui');
        currentQuestions = [...allQuestions].sort(() => Math.random() - 0.5);
        currentIdx = 0; score = 0; history = [];
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentIdx];
        selectedIdx = null;
        
        // UI
        document.getElementById('cat-label').innerText = q.cat.toUpperCase();
        document.getElementById('counter-label').innerText = `${currentIdx + 1} / 65`;
        document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / 65) * 100}%`;
        document.getElementById('q-text').innerText = q.q;
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        
        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => selectOption(i, div);
            grid.appendChild(div);
        });

        document.getElementById('validate-btn').style.display = 'block';
        document.getElementById('validate-btn').disabled = true;
        document.getElementById('next-btn').style.display = 'none';
    }

    function selectOption(idx, el) {
        if (document.getElementById('next-btn').style.display === 'block') return;
        selectedIdx = idx;
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('validate-btn').disabled = false;
    }

    function validateAnswer() {
        const q = currentQuestions[currentIdx];
        const isCorrect = selectedIdx === q.correct;
        if(isCorrect) score++;
        
        history.push({ q: q.q, user: q.options[selectedIdx], correct: q.options[q.correct], status: isCorrect });
        
        const options = document.querySelectorAll('.option');
        options[q.correct].classList.add('correct');
        if(!isCorrect) options[selectedIdx].classList.add('wrong');
        
        document.getElementById('validate-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < 65) showQuestion();
        else finishGame();
    }

    function finishGame() {
        switchScreen('recap');
        document.getElementById('final-score').innerText = `${score}/65`;
        
        // Stats
        localStorage.setItem('sns_last', score);
        const best = localStorage.getItem('sns_best') || 0;
        if(score > best) localStorage.setItem('sns_best', score);
        
        // Recap List
        const list = document.getElementById('recap-list');
        list.innerHTML = history.map((h, i) => `
            <div class="recap-item ${h.status ? 'is-correct' : ''}">
                <div style="font-weight:bold; margin-bottom:5px;">${i+1}. ${h.q}</div>
                <div style="font-size:0.9rem; color:${h.status ? 'var(--success)' : 'var(--danger)'}">
                    Réponse : ${h.user}
                </div>
                ${!h.status ? `<div style="font-size:0.9rem; color:var(--success)">Correction : ${h.correct}</div>` : ''}
            </div>
        `).join('');
    }

    function switchScreen(id) {
        document.querySelectorAll('#game-container > div').forEach(div => div.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    initStats();
</script>
</body>
</html>
